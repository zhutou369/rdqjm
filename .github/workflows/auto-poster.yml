name: Gemini Auto Content Updater

on:
  # 每天北京时间上午 09:30 准时自动触发更新 (9:30 AM HKT = 1:30 AM UTC)
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch: # 允许你在 GitHub Web 界面上手动点击按钮随时触发测试

# 🚀 2026 规范：在全局显式注入强制使用 Node 24 的环境变量
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# 🌟 核心修复点 1：显式在代码层面死死锁住“允许机器人反向写入仓库”的最高权限
permissions:
  contents: write

jobs:
  build-and-post:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出 11ty 项目的全部源码（配置 fetch-depth: 0 保证 Git 历史完整，Push 时不冲突）
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 2. 部署最新一代的 Node.js 24 生产环境（消除弃用警告）
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    # 3. 安装谷歌最新官方 AI SDK
    - name: Install @google/genai
      run: npm install @google/genai

    # 4. 运行 Node 脚本，🌟 核心修复点 2：把这里彻底改成运行你最新的 autobot.js
    - name: Run Gemini Content Generator
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: node autobot.js

    # 5. 🌟 核心修复点 3：检查是否有新文章诞生，并用带有特权 Token 的安全身份推回 GitHub
    - name: Commit and Push Changes back to Repo
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "Gemini-Content-Bot"
        git config --global user.email "bot@yourdomain.com"
        
        git add .
        
        # 检查是否有代码改变（包括 keywords.txt 的减少和 posts 内新 md 的增加），避免因没有文件更新导致报错
        if ! git diff --cached --quiet; then
          git commit -m "🤖 [Bot] 自动同步今日定时SEO文章并更新词库"
          # 🌟 必须带着特权临时 Token 强制安全推回 main 分支
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
          echo "✅ 成功反向将新文章与更新后的词库同步回 GitHub 仓库！"
        else
          echo "⚠️ 检查发现本地文件无任何变化，本次自动跳过推送。"
        fi